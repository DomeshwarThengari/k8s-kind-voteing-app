apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: voting-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      name: worker
      namespace: voting-app
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: jojogojo/worker-image
        ports:
        - containerPort: 80
          name: worker